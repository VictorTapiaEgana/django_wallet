<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>{{ title|default:"DjangoWallet" }}</title>

</head>

<body>

    <div class="min-h-screen bg-slate-950 flex overflow-hidden">
    
        <div id="mobile-overlay" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-40 hidden md:hidden transition-opacity duration-300"></div>

        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-slate-900 border-r border-slate-800 flex flex-col transform -translate-x-full transition-transform duration-300 ease-in-out md:relative md:translate-x-0 md:flex-shrink-0">
            
            <div class="p-6 flex items-center justify-between border-b border-slate-800/50">
                <a href="{% url 'gestion:dashboard' %}" class="flex items-center gap-3">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                        <rect x="2" y="6" width="20" height="12" rx="2" stroke="black" stroke-width="1.5" fill="#f4f4f4"/>
                        <path d="M2 8H18C19.1 8 20 7.1 20 6C20 4.9 19.1 4 18 4H4C2.9 4 2 4.9 2 6V8Z" fill="#indigo-500"/>
                        <circle cx="16.5" cy="12" r="1" fill="black"/>
                    </svg>
                    <span class="text-xl font-bold text-white tracking-tight">Django Wallet</span>
                </a>
                <button id="close-menu" class="md:hidden p-2 text-slate-400 hover:text-white">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor font-bold">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <nav class="flex-1 mt-4 px-4 space-y-2 overflow-y-auto custom-scrollbar">
                <a href="{% url 'gestion:dashboard' %}" class="flex items-center px-4 py-3 text-sm font-medium text-white bg-indigo-600/10 border border-indigo-500/20 rounded-xl transition-all">
                    <svg class="mr-3 h-5 w-5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    Dashboard
                </a>

                <details class="group [&_summary::-webkit-details-marker]:hidden">
                    <summary class="flex items-center justify-between px-4 py-3 text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-800/50 rounded-xl transition-all cursor-pointer list-none">
                        <div class="flex items-center">
                            <svg class="mr-3 h-6 w-6 text-slate-500 group-hover:text-indigo-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <rect x="3" y="6" width="18" height="12" rx="3" stroke-width="1.5"/>
                                <circle cx="9" cy="12" r="2" stroke-width="1.5"/>
                            </svg>
                            <span>Mis cuentas</span>
                        </div>
                        <svg class="h-4 w-4 transition-transform duration-300 group-open:rotate-180 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </summary>
                    <div class="pl-12 mt-1 space-y-1 border-l border-slate-800 ml-6">
                        <a href="{% url 'gestion:agregar_cuenta' %}" class="block py-2 text-sm text-slate-500 hover:text-indigo-400 transition-colors">Crear nueva</a>
                        <a href="{% url 'gestion:administrar_cuentas' %}" class="block py-2 text-sm text-slate-500 hover:text-indigo-400 transition-colors">Administrar</a>
                    </div>
                </details>

                <a href="{% url 'gestion:transferencias' %}" class="flex items-center px-4 py-3 text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-800/50 rounded-xl transition-all">
                    <svg class="mr-3 h-6 w-6 text-slate-500 group-hover:text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Transferencias
                </a>

                <a href="{% url 'gestion:transacciones' %}" class="flex items-center px-4 py-2.5 text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-800/50 rounded-xl transition-all group">                    

                    <svg class="mr-3 h-5 w-5 text-slate-500 group-hover:text-indigo-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>

                    Transacciones

                </a>
            </nav>

            <div class="p-4 border-t border-slate-800">
                <div class="flex items-center p-2 rounded-lg bg-slate-950/50">
                    <div class="h-8 w-8 rounded-full bg-indigo-500 flex items-center justify-center text-xs font-bold text-white">{{ user.username|first|upper }}</div>
                    <div class="ml-3 overflow-hidden">
                        <p class="text-sm font-medium text-white truncate uppercase">{{ user.username }}</p>
                        <p class="text-xs text-slate-500 truncate italic font-bold">{{ user.email }}</p>                        
                    </div>
                </div>
            </div>
        </aside>

        <div class="flex-1 flex flex-col min-w-0">
            
            <header class="h-16 bg-slate-950/50 backdrop-blur-md border-b border-slate-900 flex items-center justify-between px-6 z-30">
                <button id="menu-toggle" class="md:hidden p-2 text-slate-400 hover:text-white bg-slate-900 rounded-lg">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>

                <div class="flex items-center gap-6 ml-auto">
                    <form method="POST" action="{% url 'gestion:logout' %}" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="text-xs font-bold text-slate-500 hover:text-rose-500 uppercase tracking-widest transition-colors">
                            Cerrar sesión
                        </button>
                    </form>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-6 md:p-10">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

<script>
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('mobile-overlay');
    const btnOpen = document.getElementById('menu-toggle');
    const btnClose = document.getElementById('close-menu');

    function toggleMenu() {
        sidebar.classList.toggle('-translate-x-full');
        overlay.classList.toggle('hidden');
        document.body.classList.toggle('overflow-hidden');
    }

    btnOpen.addEventListener('click', toggleMenu);
    btnClose.addEventListener('click', toggleMenu);
    overlay.addEventListener('click', toggleMenu);
</script>

</body>
</html>
