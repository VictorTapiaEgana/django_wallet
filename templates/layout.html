<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>{{ title|default:"DjangoWallet" }}</title>
</head>

<body>

    <div class="min-h-screen bg-slate-950 flex">
  
        <aside class="w-64 bg-slate-900 border-r border-slate-800 flex-shrink-0 hidden md:flex flex-col">
            <div class="p-6 flex items-center gap-3">
                <a href="{% url 'gestion:dashboard' %}"class="flex items-center gap-3">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">  
                        <rect x="2" y="6" width="20" height="12" rx="2" stroke="black" stroke-width="1.5" fill="#f4f4f4"/>  
                        <path d="M2 8H18C19.1 8 20 7.1 20 6C20 4.9 19.1 4 18 4H4C2.9 4 2 4.9 2 6V8Z" stroke="black" stroke-width="1.5" fill="#e0e0e0"/>  
                        <rect x="14" y="10" width="6" height="4" rx="1" stroke="black" stroke-width="1.2" fill="white"/>  
                        <circle cx="16.5" cy="12" r="0.8" fill="black"/>
                    </svg>                
                    <span class="text-xl font-bold text-white tracking-tight">Django Wallet</span>
                </a>
            </div>

            <nav class="mt-6 px-4 flex-1 space-y-2">
                <a href="{% url 'gestion:dashboard' %}" class="flex items-center px-4 py-2.5 text-sm font-medium text-white bg-slate-800 rounded-xl transition-all">
                    <svg class="mr-3 h-5 w-5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    Dashboard
                </a>

                <!-- <a href="{% url 'gestion:agregar_cuenta' %}" class="flex items-center px-4 py-2.5 text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-800/50 rounded-xl transition-all group">                    
                         
                
                    <svg class="mr-3 h-7 w-7 text-slate-500 group-hover:text-indigo-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <rect x="3" y="6" width="18" height="12" rx="3" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M3 9H21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <rect x="14.5" y="11" width="4" height="2.5" rx="1" stroke="currentColor" stroke-width="1.2"/>
                        <circle cx="9" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M9 10.8V13.2M7.8 12H10.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>                        
                    Mis cuentas 
                </a> -->
                <details class="group [&_summary::-webkit-details-marker]:hidden">
    
                    <summary class="flex items-center justify-between px-4 py-2.5 text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-800/50 rounded-xl transition-all cursor-pointer list-none">
                        
                        <div class="flex items-center">
                            <svg class="mr-3 h-7 w-7 text-slate-500 group-hover:text-indigo-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <rect x="3" y="6" width="18" height="12" rx="3" stroke-width="1.5"/>
                                <path d="M3 9H21" stroke-width="1.5" stroke-linecap="round"/>
                                <rect x="14.5" y="11" width="4" height="2.5" rx="1" stroke-width="1.2"/>
                                <circle cx="9" cy="12" r="3" stroke-width="1.5"/>
                                <path d="M9 10.8V13.2M7.8 12H10.2" stroke-width="1.5" stroke-linecap="round"/>
                            </svg>
                            <span>Mis cuentas</span>
                        </div>

                        <svg class="h-4 w-4 transition-transform duration-300 group-open:rotate-180 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>

                    </summary>

                    <div class="pl-14 mt-2 space-y-1">               
                        
                        <a href="{% url 'gestion:agregar_cuenta' %}" class="block py-2 text-sm text-slate-500 hover:text-indigo-400 border-l border-slate-800 pl-4 hover:border-indigo-500 transition-all">
                            Crear nueva
                        </a>

                        <a href="{% url 'gestion:administrar_cuentas' %}" class="block py-2 text-sm text-slate-500 hover:text-indigo-400 border-l border-slate-800 pl-4 hover:border-indigo-500 transition-all">
                            Administrar
                        </a>

                    </div>

                </details>


                <a href="#" class="flex items-center px-4 py-2.5 text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-800/50 rounded-xl transition-all group">
                    
                    <svg class="mr-3 h-6 w-6 text-slate-500 group-hover:text-indigo-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">                        
                        <rect x="2" y="6" width="7" height="5" rx="1.5" stroke="currentColor" stroke-width="1.5"/>                                               
                        <rect x="15" y="13" width="7" height="5" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M9 8.5H16M16 8.5L13.5 6M16 8.5L13.5 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M15 15.5H8M8 15.5L10.5 13M8 15.5L10.5 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    
                    Transferencias
                </a>

                <a href="#" class="flex items-center px-4 py-2.5 text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-800/50 rounded-xl transition-all group">                    

                    <svg class="mr-3 h-5 w-5 text-slate-500 group-hover:text-indigo-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>

                    Lista de contactos

                </a>
            </nav>

            <div class="p-4 border-t border-slate-800">
                <div class="flex items-center p-2 rounded-lg bg-slate-950/50">
                    <div class="h-8 w-8 rounded-full bg-indigo-500 flex items-center justify-center text-xs font-bold text-white">{{ user.username|first|upper }}</div>
                    <div class="ml-3 overflow-hidden">
                        <p class="text-sm font-medium text-white truncate uppercase">{{ user.username }}</p>
                        <p class="text-xs text-slate-500 truncate italic font-bold">{{ user.email }}</p>                        
                    </div>
                </div>
            </div>
        </aside>

        <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
            
            <header class="h-16 bg-slate-900/50 backdrop-blur-md border-b border-slate-800 flex items-center justify-end px-8 z-10">
 
                <div class="flex items-center gap-4">
                    <button class="p-2 text-slate-400 hover:text-white transition-colors relative">
                        <span class="absolute top-2 right-2 h-2 w-2 bg-indigo-500 rounded-full border-2 border-slate-900"></span>
                    
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                        </svg>

                    </button>                

                    <form method="POST" action="{% url 'gestion:logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="text-sm font-medium text-slate-400 hover:text-indigo-400 transition-colors">
                            Cerrar sesión
                        </button>
                    </form> 
                    
                </div>
            </header>

            <main class="flex-1 relative overflow-y-auto focus:outline-none p-8">
                <div class="py-6">
                  
                    {% block content %}

                    {% endblock %}

                </div>
            </main>

        </div>
    </div>

</body>
</html>
