{% extends 'layout.html' %}

{% block content %}
    <div class="min-h-screen bg-slate-950 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
        <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
            <div class="mx-auto h-12 w-12 rounded-xl bg-indigo-600 flex items-center justify-center shadow-lg shadow-indigo-500/20">
            <svg class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 10-8 0v4h8z" />
            </svg>
            </div>
            <h2 class="mt-6 text-3xl font-extrabold text-white tracking-tight">
            Bienvenido de nuevo
            </h2>
            <p class="mt-2 text-sm text-slate-400">
            Ingresa a tu cuenta para continuar
            </p>
        </div>

        <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
            <div class="bg-slate-900 py-8 px-4 shadow-2xl border border-slate-800 sm:rounded-2xl sm:px-10">
            
            <form class="space-y-6" method="POST">
                {% csrf_token %}
                
                <div>
                <label for="username" class="block text-sm font-medium text-slate-300">
                    Usuario
                </label>
                <div class="mt-1">
                    <input id="username" name="username" type="text" required 
                    class="appearance-none block w-full px-3 py-2.5 bg-slate-800 border border-slate-700 rounded-lg shadow-sm placeholder-slate-500 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent sm:text-sm transition-all"
                    placeholder="Tu nombre de usuario">
                </div>
                </div>

                <div>
                <label for="password" class="block text-sm font-medium text-slate-300">
                    Contraseña
                </label>
                <div class="mt-1">
                    <input id="password" name="password" type="password" required 
                    class="appearance-none block w-full px-3 py-2.5 bg-slate-800 border border-slate-700 rounded-lg shadow-sm placeholder-slate-500 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent sm:text-sm transition-all"
                    placeholder="••••••••">
                </div>
                </div>

                <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox" 
                    class="h-4 w-4 text-indigo-500 focus:ring-indigo-500 border-slate-700 rounded bg-slate-800">
                    <label for="remember-me" class="ml-2 block text-sm text-slate-400">
                    Recordarme
                    </label>
                </div>
                <div class="text-sm">
                    <a href="#" class="font-medium text-indigo-400 hover:text-indigo-300">
                    ¿Olvidaste tu contraseña?
                    </a>
                </div>
                </div>

                <div>
                <button type="submit" 
                    class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 focus:ring-indigo-500 transition-colors">
                    Iniciar Sesión
                </button>
                </div>
            </form>

            {% if form.errors %}
                <div class="mt-4 p-3 rounded-lg bg-red-900/30 border border-red-800">
                <p class="text-sm text-red-400 text-center font-medium">
                    Usuario o contraseña incorrectos.
                </p>
                </div>
            {% endif %}

            </div>
        </div>
    </div>

{% endblock %}
