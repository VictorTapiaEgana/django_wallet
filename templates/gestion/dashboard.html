{% extends 'layout.html' %}

{% block content %}
    <div class="min-h-screen bg-slate-950 flex">
  
        <aside class="w-64 bg-slate-900 border-r border-slate-800 flex-shrink-0 hidden md:flex flex-col">
            <div class="p-6 flex items-center gap-3">

                <svg class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            <span class="text-xl font-bold text-white tracking-tight">CloudDash</span>
            </div>

            <nav class="mt-6 px-4 flex-1 space-y-2">
            <a href="#" class="flex items-center px-4 py-2.5 text-sm font-medium text-white bg-slate-800 rounded-xl transition-all">
                <svg class="mr-3 h-5 w-5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />

                Dashboard
            </a>

                <svg class="mr-3 h-5 w-5 text-slate-500 group-hover:text-indigo-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />

                Estadísticas
            </a>
            <a href="#" class="flex items-center px-4 py-2.5 text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-800/50 rounded-xl transition-all group">
                <svg class="mr-3 h-5 w-5 text-slate-500 group-hover:text-indigo-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />

                Usuarios
            </a>
            </nav>

            <div class="p-4 border-t border-slate-800">
            <div class="flex items-center p-2 rounded-lg bg-slate-950/50">
                <div class="h-8 w-8 rounded-full bg-indigo-500 flex items-center justify-center text-xs font-bold text-white">JD</div>
                <div class="ml-3 overflow-hidden">
                <p class="text-sm font-medium text-white truncate">John Doe</p>
                <p class="text-xs text-slate-500 truncate italic">Admin</p>
                </div>
            </div>
            </div>
        </aside>

        <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
            
            <header class="h-16 bg-slate-900/50 backdrop-blur-md border-b border-slate-800 flex items-center justify-between px-8 z-10">
            <div class="flex items-center">
                <h1 class="text-lg font-semibold text-white">Panel Principal</h1>
            </div>
            <div class="flex items-center gap-4">
                <button class="p-2 text-slate-400 hover:text-white transition-colors relative">
                <span class="absolute top-2 right-2 h-2 w-2 bg-indigo-500 rounded-full border-2 border-slate-900"></span>
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />

                <button type="submit" class="text-sm font-medium text-slate-400 hover:text-indigo-400 transition-colors">
                    Cerrar sesión
                </button>
            </form>  -->

            </header>

            <main class="flex-1 relative overflow-y-auto focus:outline-none p-8">
            <div class="py-6">
                
                <div class="border-4 border-dashed border-slate-800 rounded-3xl h-96 flex items-center justify-center">
                <span class="text-slate-600 font-medium">Inserta tus componentes aquí</span>
                </div>

            </main>

        </div>
    </div>
{% endblock %}
