{% extends 'layout.html' %}

{% block content %}
    <div class="min-h-[80vh] flex items-center justify-center px-4">
        <div class="text-center">
            <div class="inline-flex items-center justify-center w-24 h-24 rounded-full bg-indigo-500/10 mb-8 border border-indigo-500/20">
                <svg class="w-12 h-12 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>

            <h1 class="text-6xl font-black text-white mb-4 tracking-tighter">404</h1>
            <h2 class="text-xl font-medium text-slate-300 mb-6">Página no encontrada</h2>
            
            <p class="text-slate-500 max-w-sm mx-auto mb-10 leading-relaxed">
                Parece que la dirección que ingresaste no existe en nuestro sistema financiero. 
                Verifica la URL o vuelve al panel principal.
            </p>

            <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                <a href="{% url 'gestion:dashboard' %}" 
                class="px-8 py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl transition-all shadow-lg shadow-indigo-500/20 active:scale-95">
                    Ir al Dashboard
                </a>
                <button onclick="history.back()" 
                class="px-8 py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 font-semibold rounded-xl transition-all">
                    Regresar
                </button>
            </div>
        </div>
    </div>
{% endblock %}
